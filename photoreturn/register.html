<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漫展返图系统 - 注册</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>创建管理员账号</h1>
      <p>填写以下信息注册新账号</p>
    </div>
    
    <div id="alert" class="alert" style="display: none;"></div>
    
    <form id="registerForm">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" required>
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码" required>
      </div>
      <div class="form-group">
        <label for="confirmPassword">确认密码</label>
        <input type="password" id="confirmPassword" placeholder="请再次输入密码" required>
      </div>
      <button type="submit" class="btn btn-primary">注 册</button>
    </form>
    
    <p class="text-center">
      已有账号？<a href="index.html" class="link">立即登录</a>
    </p>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const alertDiv = document.getElementById('alert');
      
      if (password !== confirmPassword) {
        alertDiv.textContent = '两次输入的密码不一致';
        alertDiv.className = 'alert alert-error';
        alertDiv.style.display = 'block';
        return;
      }
      
      if (password.length < 6) {
        alertDiv.textContent = '密码长度至少需要6位';
        alertDiv.className = 'alert alert-error';
        alertDiv.style.display = 'block';
        return;
      }
      
      const users = JSON.parse(localStorage.getItem('users') || '[]');
      
      if (users.find(u => u.username === username)) {
        alertDiv.textContent = '该用户名已被注册';
        alertDiv.className = 'alert alert-error';
        alertDiv.style.display = 'block';
        return;
      }
      
      users.push({
        id: Date.now(),
        username,
        password,
        createdAt: new Date().toISOString()
      });
      
      localStorage.setItem('users', JSON.stringify(users));
      
      alertDiv.textContent = '注册成功！即将跳转到登录页面...';
      alertDiv.className = 'alert alert-success';
      alertDiv.style.display = 'block';
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 2000);
    });
  </script>
</body>
</html>
